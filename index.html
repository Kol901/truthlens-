<!DOCTYPE html>
<html>
<head>
  <title>TruthLens AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">

<header class="p-6 border-b border-gray-800 flex justify-between">
  <h1 class="text-xl font-bold">TruthLens AI</h1>
  <a href="dashboard.html" class="text-blue-400">History</a>
</header>

<main class="max-w-3xl mx-auto py-16">
  <h2 class="text-4xl font-bold mb-6 text-center">
    AI Fact-Checking Engine
  </h2>

  <textarea id="inputText"
    class="w-full p-4 rounded bg-gray-800"
    rows="6"
    placeholder="Paste link or content..."></textarea>

  <button onclick="analyze()"
    class="mt-4 w-full bg-blue-600 py-3 rounded font-semibold hover:bg-blue-500">
    Verify Now
  </button>

  <div id="result" class="mt-10 hidden"></div>
</main>

<script src="app.js"></script>
</body>
</html>
